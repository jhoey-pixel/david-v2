<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>David Prototype Chat</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --panel: #ffffff;
        --text: #1f2933;
        --muted: #6b7785;
        --primary: #2f6f64;
        --primary-soft: #e4f1ee;
        --border: #d9e2ec;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .app {
        width: min(760px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }

      .header {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        background: #f9fbfc;
      }

      .header h1 { margin: 0; font-size: 1.05rem; font-weight: 650; }
      .header p { margin: 0.25rem 0 0; color: var(--muted); font-size: 0.92rem; }

      .chat {
        height: 60vh;
        min-height: 360px;
        max-height: 620px;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
      }

      .msg { padding: 0.7rem 0.85rem; border-radius: 12px; line-height: 1.4; max-width: 85%; white-space: pre-wrap; }
      .user { align-self: flex-end; background: #e7f0ff; border: 1px solid #c9dbff; }
      .david { align-self: flex-start; background: var(--primary-soft); border: 1px solid #c9e0d9; }

      .composer { border-top: 1px solid var(--border); padding: 0.9rem; display: flex; gap: 0.6rem; }

      .composer input { flex: 1; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem; padding: 0.75rem 0.85rem; }
      .composer input:focus { outline: 2px solid #a7d3c8; border-color: var(--primary); }

      .composer button { border: none; border-radius: 10px; background: var(--primary); color: white; padding: 0.75rem 1rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
      .composer button:disabled { opacity: 0.65; cursor: not-allowed; }

      .hint { color: var(--muted); font-size: 0.8rem; margin: 0 0.9rem 0.9rem; }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>David Prototype</h1>
        <p>Clarity-first support chat demo</p>
      </header>

      <section class="chat" id="chat" aria-live="polite"></section>

      <form class="composer" id="chat-form">
        <input id="chat-input" type="text" placeholder="Type a message..." autocomplete="off" required />
        <button id="send-btn" type="submit">Send</button>
      </form>
      <p class="hint">David stays calm and human while asking one question that sharpens clarity.</p>
    </main>

    <script>
      const chat = document.getElementById('chat');
      const form = document.getElementById('chat-form');
      const input = document.getElementById('chat-input');
      const sendBtn = document.getElementById('send-btn');
      const conversationHistory = [];
      const conversationMemory = {
        userName: null,
      };

      function addMessage(text, role) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      function setSendingState(isSending) {
        sendBtn.disabled = isSending;
        input.disabled = isSending;
      }

      async function sendToDavid(userMessage) {
        const response = await fetch('/.netlify/functions/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: userMessage,
            history: conversationHistory,
            memory: conversationMemory,
          }),
        });

        if (!response.ok) {
          const details = await response.text();
          console.error('Chat function request failed:', response.status, details);
          throw new Error('Unable to get response from David right now.');
        }

        const data = await response.json();

        if (data?.memory && typeof data.memory === 'object') {
          Object.assign(conversationMemory, data.memory);
        }

        return data.reply;
      }

      const initialGreeting =
        "I’m here with you. We can keep this simple and grounded.\nStart by sharing what’s on your mind.\nWhat would help most right now?";

      addMessage(initialGreeting, 'david');
      conversationHistory.push({ role: 'assistant', content: initialGreeting });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        conversationHistory.push({ role: 'user', content: text });
        input.value = '';

        setSendingState(true);
        try {
          const davidReply = await sendToDavid(text);
          addMessage(davidReply, 'david');
          conversationHistory.push({ role: 'assistant', content: davidReply });
        } catch (error) {
          console.error('Frontend chat error:', error);
          addMessage('I hit a connection issue. Please try again in a moment.', 'david');
        } finally {
          setSendingState(false);
          input.focus();
        }
      });
    </script>
  </body>
</html>
