<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>David Prototype Chat</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --panel: #ffffff;
        --text: #1f2933;
        --muted: #6b7785;
        --primary: #2f6f64;
        --primary-soft: #e4f1ee;
        --border: #d9e2ec;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .app {
        width: min(760px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }

      .header {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        background: #f9fbfc;
      }

      .header h1 {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 650;
      }

      .header p {
        margin: 0.25rem 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .chat {
        height: 60vh;
        min-height: 360px;
        max-height: 620px;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
      }

      .msg {
        padding: 0.7rem 0.85rem;
        border-radius: 12px;
        line-height: 1.4;
        max-width: 85%;
        white-space: pre-wrap;
      }

      .user {
        align-self: flex-end;
        background: #e7f0ff;
        border: 1px solid #c9dbff;
      }

      .david {
        align-self: flex-start;
        background: var(--primary-soft);
        border: 1px solid #c9e0d9;
      }

      .composer {
        border-top: 1px solid var(--border);
        padding: 0.9rem;
        display: flex;
        gap: 0.6rem;
      }

      .composer input {
        flex: 1;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 1rem;
        padding: 0.75rem 0.85rem;
      }

      .composer input:focus {
        outline: 2px solid #a7d3c8;
        border-color: var(--primary);
      }

      .composer button {
        border: none;
        border-radius: 10px;
        background: var(--primary);
        color: white;
        padding: 0.75rem 1rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }

      .composer button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .hint {
        color: var(--muted);
        font-size: 0.8rem;
        margin: 0 0.9rem 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>David Prototype</h1>
        <p>Calm support chat demo</p>
      </header>

      <section class="chat" id="chat" aria-live="polite"></section>

      <form class="composer" id="chat-form">
        <input id="chat-input" type="text" placeholder="Type a message..." autocomplete="off" required />
        <button type="submit">Send</button>
      </form>
      <p class="hint">David adapts tone to your emotional state: calm, concise, and human.</p>
    </main>

    <script>
      const chat = document.getElementById('chat');
      const form = document.getElementById('chat-form');
      const input = document.getElementById('chat-input');
      const memory = {
        lastTopic: null,
        turnCount: 0,
        lastEndedWithQuestion: false,
      };

      function addMessage(text, role) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      function buildDavidReply(userText) {
        const normalized = userText.trim();
        const lower = normalized.toLowerCase();

        const hasAny = (terms) => terms.some((term) => lower.includes(term));
        const topicMatchers = [
          { key: 'improving-david', terms: ['david', 'assistant', 'bot', 'reply', 'responses', 'human'] },
          { key: 'work', terms: ['work', 'job', 'boss', 'team', 'project', 'deadline', 'coworker'] },
          { key: 'relationship', terms: ['him', 'her', 'partner', 'relationship', 'friend', 'family', 'wife', 'husband'] },
          { key: 'clarity', terms: ['don\'t understand', 'do not understand', 'unclear', 'confused', 'lost'] },
        ];
        const topic = topicMatchers.find((m) => hasAny(m.terms))?.key || 'general';

        const need = (() => {
          if (hasAny(['need to talk', 'conversation', 'talk to', 'say this'])) return 'prepare-conversation';
          if (hasAny(['improve', 'better', 'fix', 'make'])) return 'improve-something';
          if (hasAny(['don\'t understand', 'do not understand', 'unclear', 'confused'])) return 'clarity';
          if (hasAny(['stuck', 'what do i do', 'help'])) return 'next-step';
          return 'clarify';
        })();

        const pressure = (() => {
          if (hasAny(['excited', 'hopeful', 'energized'])) return 'positive-energy';
          if (hasAny(['tired', 'overwhelmed', 'drained', 'burned out'])) return 'fatigue';
          if (hasAny(['frustrated', 'angry', 'annoyed'])) return 'frustration';
          if (hasAny(['worried', 'afraid', 'scared'])) return 'fear';
          if (hasAny(['confused', 'unclear', 'don\'t understand', 'do not understand'])) return 'confusion';
          return 'neutral';
        })();

        memory.lastTopic = topic;
        memory.turnCount += 1;

        const shouldAskQuestion = (() => {
          if (need === 'clarity' || pressure === 'confusion') return true;
          if (need === 'next-step' || hasAny(['?', 'what should i do', 'can you help'])) return true;
          if (pressure === 'fear' || pressure === 'frustration') return !memory.lastEndedWithQuestion;
          return false;
        })();

        const finish = (line) => {
          memory.lastEndedWithQuestion = line.trim().endsWith('?');
          return line;
        };

        if (topic === 'improving-david') {
          return finish(`You’re naming a real issue: repeated coaching structure makes David feel scripted.
He should respond to meaning, not force a question every turn.`);
        }

        if (need === 'prepare-conversation' || topic === 'relationship') {
          if (shouldAskQuestion) {
            return finish(`It sounds like that conversation already carries emotional weight before it happens.
What part feels hardest to say out loud?`);
          }
          return finish(`It sounds like that conversation already carries emotional weight before it happens.`);
        }

        if (need === 'clarity' || topic === 'clarity' || pressure === 'confusion') {
          return finish(`Okay. Let’s slow it down together.
What part feels unclear right now?`);
        }

        if (pressure === 'positive-energy') {
          return finish(`That sounds like energy moving toward something meaningful.`);
        }

        if (topic === 'work') {
          if (shouldAskQuestion) {
            return finish(`Work sounds like the pressure point right now.
What would make this week feel a little more manageable?`);
          }
          return finish(`Work sounds like the pressure point right now.`);
        }

        if (pressure === 'fatigue') {
          return finish(`You sound tired in a deep way, not just busy.
It makes sense your bandwidth feels thin.`);
        }

        if (pressure === 'frustration') {
          if (shouldAskQuestion) {
            return finish(`I can hear the tension in this.
What feels most stuck?`);
          }
          return finish(`I can hear the tension in this.`);
        }

        if (pressure === 'fear') {
          if (shouldAskQuestion) {
            return finish(`That sounds heavy to hold on your own.
What feels most uncertain right now?`);
          }
          return finish(`That sounds heavy to hold on your own.`);
        }

        if (shouldAskQuestion) {
          return finish(`Got it.
Where do you want to begin?`);
        }

        const neutralResponses = [
          `I hear you. We can keep this simple.`,
          `That makes sense. You don’t need to force clarity all at once.`,
          `There’s a lot in that, and you’re tracking it honestly.`,
          `I’m with you. We can take this one piece at a time.`,
        ];

        return finish(neutralResponses[memory.turnCount % neutralResponses.length]);
      }

      addMessage(
        "I’m here with you. We can keep this simple and grounded.\nStart by sharing what’s on your mind.\nWhat would help most right now?",
        'david'
      );

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';

        window.setTimeout(() => {
          addMessage(buildDavidReply(text), 'david');
        }, 250);
      });
    </script>
  </body>
</html>
