<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>David Prototype Chat</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --panel: #ffffff;
        --text: #1f2933;
        --muted: #6b7785;
        --primary: #2f6f64;
        --primary-soft: #e4f1ee;
        --border: #d9e2ec;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .app {
        width: min(760px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }

      .header {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        background: #f9fbfc;
      }

      .header h1 {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 650;
      }

      .header p {
        margin: 0.25rem 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .chat {
        height: 60vh;
        min-height: 360px;
        max-height: 620px;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
      }

      .msg {
        padding: 0.7rem 0.85rem;
        border-radius: 12px;
        line-height: 1.4;
        max-width: 85%;
        white-space: pre-wrap;
      }

      .user {
        align-self: flex-end;
        background: #e7f0ff;
        border: 1px solid #c9dbff;
      }

      .david {
        align-self: flex-start;
        background: var(--primary-soft);
        border: 1px solid #c9e0d9;
      }

      .composer {
        border-top: 1px solid var(--border);
        padding: 0.9rem;
        display: flex;
        gap: 0.6rem;
      }

      .composer input {
        flex: 1;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 1rem;
        padding: 0.75rem 0.85rem;
      }

      .composer input:focus {
        outline: 2px solid #a7d3c8;
        border-color: var(--primary);
      }

      .composer button {
        border: none;
        border-radius: 10px;
        background: var(--primary);
        color: white;
        padding: 0.75rem 1rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }

      .composer button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .hint {
        color: var(--muted);
        font-size: 0.8rem;
        margin: 0 0.9rem 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>David Prototype</h1>
        <p>Calm support chat demo</p>
      </header>

      <section class="chat" id="chat" aria-live="polite"></section>

      <form class="composer" id="chat-form">
        <input id="chat-input" type="text" placeholder="Type a message..." autocomplete="off" required />
        <button type="submit">Send</button>
      </form>
      <p class="hint">David adapts tone to your emotional state: calm, concise, and human.</p>
    </main>

    <script>
      const chat = document.getElementById('chat');
      const form = document.getElementById('chat-form');
      const input = document.getElementById('chat-input');
      const memory = {
        askedTopics: new Set(),
        lastTopic: null,
        lastQuestionStyle: null,
      };

      function addMessage(text, role) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      function classifyDrainType(text) {
        const lowered = text.toLowerCase();
        if (lowered.includes('emotion')) return 'emotional';
        if (lowered.includes('mental')) return 'mental';
        if (lowered.includes('physical') || lowered.includes('body')) return 'physical';
        return null;
      }

      function buildDavidReply(userText) {
        const normalized = userText.trim();
        const lower = normalized.toLowerCase();

        const hasAny = (terms) => terms.some((term) => lower.includes(term));
        const looksLikeFollowUp = normalized.split(/\s+/).length <= 5;

        const relationshipSignals = ['him', 'her', 'them', 'partner', 'relationship', 'friend', 'family', 'husband', 'wife', 'boyfriend', 'girlfriend'];
        const conversationSignals = ['talk', 'talking', 'conversation', 'conversations', 'say', 'saying', 'honest', 'honestly', 'real conversation', 'hard to bring up'];
        const relationshipConversation = hasAny(relationshipSignals) && hasAny(conversationSignals)
          || hasAny(['real conversation with him', 'talking to him', 'talk to him', 'real conversation']);

        const state = (() => {
          if (hasAny(['i don\'t know', 'dont know', 'idk', 'not sure what to say'])) return 'vague';
          if (hasAny(['getting david perfect', 'perfect', 'get this right', 'doing this right', 'mess this up'])) return 'perfection-pressure';
          if (hasAny(['talking to him', 'talk to him', 'talking to her', 'talking to them']) || relationshipConversation) return 'relationship-concern';
          if (hasAny(['tired', 'exhausted', 'drained', 'burned out', 'burnt out', 'wiped'])) return 'exhaustion';
          if (hasAny(['overwhelmed', 'too much', 'drowning', 'swamped', 'can\'t keep up'])) return 'overwhelm';
          if (hasAny(['confused', 'not sure', 'unclear', 'don\'t understand', 'do not understand', 'lost'])) return 'confusion';
          if (hasAny(['frustrated', 'annoyed', 'angry', 'irritated', 'fed up'])) return 'frustration';
          if (hasAny(['afraid', 'scared', 'fear', 'terrified', 'panic', 'worried'])) return 'fear';
          return 'general';
        })();

        const preview = normalized
          ? `"${normalized.slice(0, 90)}${normalized.length > 90 ? '…' : ''}"`
          : 'that';

        const drainType = classifyDrainType(normalized);
        if (drainType) {
          memory.askedTopics.add('drain-classification');
        }

        if (relationshipConversation || state === 'relationship-concern') {
          memory.lastTopic = 'relationship-conversation';
          memory.lastQuestionStyle = 'hardest-part';
          return `It sounds like the conversation itself feels important or difficult.
What feels hardest about talking to him directly?`;
        }

        if (memory.lastTopic === 'relationship-conversation' && looksLikeFollowUp) {
          return `That hesitation usually means the relationship matters.
Are you more worried about conflict, being misunderstood, or disappointing him?`;
        }

        if (state === 'perfection-pressure') {
          memory.lastTopic = 'perfection-pressure';
          memory.lastQuestionStyle = 'priority-first';
          return `It sounds like you may be carrying pressure to get David perfect.
What part of David feels most important to improve first?`;
        }

        if (state === 'vague') {
          const fromPrevious = memory.lastTopic && memory.lastTopic !== 'general';
          memory.lastTopic = fromPrevious ? memory.lastTopic : 'vague';
          memory.lastQuestionStyle = fromPrevious ? 'specific-followup' : 'clarify-anchor';
          if (fromPrevious) {
            return `That makes sense. "I don't know" can mean you're overloaded, not blank.
From what you just shared, does this feel more like confusion, pressure, or frustration?`;
          }

          return `That makes sense. If words are hard to find right now, we can keep it simple.
Is this feeling more confusing, frustrating, or tiring?`;
        }

        if (state === 'exhaustion') {
          memory.lastTopic = 'exhaustion';
          if (!memory.askedTopics.has('drain-classification')) {
            memory.askedTopics.add('drain-classification');
            return `I hear the tiredness in ${preview}.\nThat sounds like depletion, not just a busy day.\nHas it felt more mental, emotional, or physical lately?`;
          }

          if (drainType === 'emotional') {
            return "That makes sense.\nEmotional exhaustion usually has something underneath it.\nWhat’s been weighing on you the most lately?";
          }

          if (drainType === 'mental') {
            return "That tracks.\nMental exhaustion can come from carrying too many open loops.\nWhat keeps replaying in your mind the most lately?";
          }

          if (drainType === 'physical') {
            return "That sounds really wearing.\nPhysical depletion can make everything feel heavier.\nHave sleep, stress, or your routine felt most off lately?";
          }

          return "I hear that this has been draining for a while.\nLet’s go one layer deeper so we can name what’s underneath.\nDoes this feel more connected to pressure, relationships, or expectations lately?";
        }

        if (state === 'overwhelm') {
          memory.lastTopic = 'overwhelm';
          return `That sounds like a lot to carry right now.\nLet’s make this smaller so it feels doable.\nWhat is one piece we can focus on first?`;
        }

        if (state === 'confusion') {
          memory.lastTopic = 'confusion';
          return `That makes sense. When something feels unclear, the next step is not to force an answer, but to name what is confusing.\nWhat part feels hardest to understand right now?`;
        }

        if (state === 'frustration') {
          memory.lastTopic = 'frustration';
          return `That sounds really frustrating.\nYou’re making sense, even if this feels tense.\nWhat part is bothering you the most?`;
        }

        if (state === 'fear') {
          memory.lastTopic = 'fear';
          return `I hear that this feels scary right now.\nYou don’t have to figure everything out at once—we can go gently.\nWhat would help you feel a little safer in this moment?`;
        }

        let orient = "We can take this one steady step at a time.";
        if (lower.includes('work') || lower.includes('deadline') || lower.includes('project')) {
          orient = "We can narrow this to the next practical move, not the whole mountain.";
        } else if (lower.includes('relationship') || lower.includes('family') || lower.includes('friend')) {
          orient = "It helps to stay with what you can express clearly and kindly right now.";
        }

        if (memory.lastTopic === 'overwhelm') {
          memory.lastQuestionStyle = 'attention-first';
          return `That sounds like a lot. ${orient}
What is the smallest next step that would reduce pressure today?`;
        }

        if (memory.lastTopic === 'confusion') {
          memory.lastQuestionStyle = 'foggy-piece';
          return `Thanks for staying with this. ${orient}
Which specific part is still unclear?`;
        }

        if (memory.lastTopic === 'frustration') {
          memory.lastQuestionStyle = 'fixable-part';
          return `I can hear the frustration. ${orient}
Which part feels most fixable right now?`;
        }

        if (memory.lastTopic === 'fear') {
          memory.lastQuestionStyle = 'safety-step';
          return `That makes sense. ${orient}
What would help this feel a little safer right now?`;
        }

        memory.lastTopic = 'general';
        memory.lastQuestionStyle = 'meaning-first';
        return `I want to respond to what you mean, not just the words.\nAre you feeling more confused, pressured, frustrated, or tired right now?`;
      }

      addMessage(
        "I’m here with you. We can keep this simple and grounded.\nStart by sharing what’s on your mind.\nWhat would help most right now?",
        'david'
      );

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';

        window.setTimeout(() => {
          addMessage(buildDavidReply(text), 'david');
        }, 250);
      });
    </script>
  </body>
</html>
